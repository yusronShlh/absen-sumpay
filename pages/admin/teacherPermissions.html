<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kelola Data Siswa</title>
    <link href="../../assets/css/output.css" rel="stylesheet" />
  </head>

  <body class="bg-slate-50 overflow-hidden">
    <div class="flex h-screen">
      <!-- OVERLAY (mobile) -->
      <div
        id="overlay"
        class="fixed inset-0 bg-black/40 hidden z-40 md:hidden"
        onclick="toggleSidebar()"
      ></div>

      <aside
        id="sidebar"
        class="fixed md:static top-0 left-0 h-screen md:h-auto md:min-h-full overflow-y-auto z-50 w-64 bg-[#C3D9E6] text-[#1E3A5F] p-6 flex flex-col transform -translate-x-full md:translate-x-0 transition-transform duration-300 ease-in-out"
      >
        <div class="mb-10 text-center">
          <img
            src="../../assets/images/logo sumpay.edu.png"
            class="w-27 mx-auto mt-4"
          />
          <!-- <h1 class="text-xl font-bold text-slate-800 mt-3">SUMPAY.Edu</h1> -->
        </div>

        <nav class="space-y-2 text-sm font-medium">
          <a
            href="./dashboard.html"
            class="block px-4 py-2 rounded-lg hover:bg-white/70 transition"
          >
            Dashboard
          </a>

          <a
            href="./students.html"
            class="block px-4 py-2 rounded-lg hover:bg-white/70 transition"
          >
            Kelola Data Siswa
          </a>

          <a
            href="./teachers.html"
            class="block px-4 py-2 rounded-lg hover:bg-white/70 transition"
          >
            Kelola Data Guru
          </a>

          <a
            href="./classes.html"
            class="block px-4 py-2 rounded-lg hover:bg-white/70 transition"
          >
            Kelola Kelas
          </a>

          <a
            href="./subject.html"
            class="block px-4 py-2 rounded-lg hover:bg-white/70 transition"
          >
            Kelola Mapel
          </a>

          <a
            href="./lessonTime.html"
            class="block px-4 py-2 rounded-lg hover:bg-white/70 transition"
          >
            Kelola Jam Mapel
          </a>

          <a
            href="./schedule.html"
            class="block px-4 py-2 rounded-lg hover:bg-white/70 transition"
          >
            Kelola Jadwal
          </a>

          <a
            href="./studentsPermissions.html"
            class="block px-4 py-2 rounded-lg hover:bg-white/70 transition"
          >
            Approve Izin Siswa
          </a>

          <a
            href="./teacherPermissions.html"
            class="block px-4 py-2 rounded-lg bg-white shadow"
          >
            Approve Izin Guru
          </a>

          <a
            href="#"
            class="block px-4 py-2 rounded-lg hover:bg-white/70 transition"
          >
            Cetak Laporan
          </a>
        </nav>
      </aside>

      <!-- MAIN CONTENT -->
      <div class="flex-1 w-full overflow-y-auto">
        <!-- MOBILE TOP NAV -->
        <div
          class="md:hidden flex justify-between items-center bg-[#C3D9E6] p-4"
        >
          <h2 class="font-bold text-[#1E3A5F]">SUMPAY.Edu</h2>
          <button onclick="toggleSidebar()" class="text-2xl text-[#1E3A5F]">
            ☰
          </button>
        </div>
        <div>
          <!-- CONTENT WRAPPER -->
          <main class="p-4 sm:p-6 md:p-8">
            <!-- Page Header -->
            <div class="mb-8">
              <h2 class="text-3xl font-bold text-[#1E3A5F]">
                Kelola Izin Guru
              </h2>
              <!-- <p class="text-gray-500 text-sm">Manajemen data kelas sekolah</p> -->
            </div>

            <!-- FILTER STATUS -->
            <div
              class="flex gap-2 mb-6 overflow-x-auto pb-1 scrollbar-hide"
              id="permissionFilter"
            >
              <button
                data-filter="all"
                class="filter-btn px-4 py-2 text-sm font-medium rounded-xl transition-all duration-200 shadow-sm"
              >
                Semua
              </button>

              <button
                data-filter="pending"
                class="filter-btn px-4 py-2 text-sm font-medium rounded-xl transition-all duration-200 shadow-sm"
              >
                Menunggu
              </button>

              <button
                data-filter="approved"
                class="filter-btn px-4 py-2 text-sm font-medium rounded-xl transition-all duration-200 shadow-sm"
              >
                Disetujui
              </button>

              <button
                data-filter="rejected"
                class="filter-btn px-4 py-2 text-sm font-medium rounded-xl transition-all duration-200 shadow-sm"
              >
                Ditolak
              </button>
            </div>
            <!-- SECTION IZIN HARI INI -->
            <section class="mb-10">
              <div class="flex items-center justify-between mb-4">
                <h2 class="text-lg font-semibold text-gray-700">
                  Daftar Izin Guru
                </h2>

                <!-- Badge jumlah -->
                <span
                  id="permissionCount"
                  class="px-3 py-1 text-xs font-medium rounded-full bg-[#C3D9E6] text-[#1E3A5F]"
                >
                  0 Izin
                </span>
              </div>

              <div id="todayPermissionList" class="space-y-4">
                <!-- Rendered by teacherPermissions.js -->
              </div>
            </section>
          </main>
        </div>
      </div>
    </div>

    <!-- SIDEBAR SCRIPT -->
    <script>
      function toggleSidebar() {
        const sidebar = document.getElementById("sidebar");
        const overlay = document.getElementById("overlay");
        sidebar.classList.toggle("-translate-x-full");
        overlay.classList.toggle("hidden");
      }
    </script>

    <!-- SWEETALERT -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <!-- icon -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Modal dialog -->
    <!-- DETAIL MODAL -->
    <dialog
      id="permissionDetailModal"
      class="fixed inset-0 m-auto w-[500px] max-w-[95%] rounded-2xl p-0 shadow-2xl backdrop:bg-black/40 backdrop:backdrop-blur-sm transition-all duration-200 open:animate-in"
    >
      <div class="p-6">
        <div class="flex justify-between items-center mb-4">
          <h3 class="text-lg font-semibold text-[#1E3A5F]">Detail Izin</h3>
          <button
            id="closeDetailModal"
            class="text-gray-400 hover:text-gray-600 transition"
          >
            ✕
          </button>
        </div>

        <div
          id="detailContent"
          class="text-sm text-gray-600 leading-relaxed space-y-2"
        >
          <!-- Injected by JS -->
        </div>
      </div>
    </dialog>

    <!-- JS MODULE -->
    <script type="module" src="../../js/teacherPermissions.js"></script>
  </body>
</html>
