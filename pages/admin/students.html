<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kelola Data Siswa</title>
    <link href="../../assets/css/output.css" rel="stylesheet" />
  </head>

  <body class="bg-slate-50 overflow-hidden">
    <div class="flex h-screen">
      <!-- OVERLAY (mobile) -->
      <div
        id="overlay"
        class="fixed inset-0 bg-black/40 hidden z-40 md:hidden"
        onclick="toggleSidebar()"
      ></div>

      <aside
        id="sidebar"
        class="fixed md:static top-0 left-0 h-screen md:h-auto md:min-h-full overflow-y-auto z-50 w-64 bg-[#C3D9E6] text-[#1E3A5F] p-6 flex flex-col transform -translate-x-full md:translate-x-0 transition-transform duration-300 ease-in-out"
      >
        <div class="mb-10 text-center">
          <img
            src="../../assets/images/logo sumpay.edu.png"
            class="w-27 mx-auto mt-4"
          />
          <!-- <h1 class="text-xl font-bold text-slate-800 mt-3">SUMPAY.Edu</h1> -->
        </div>

        <nav class="space-y-2 text-sm font-medium">
          <a
            href="./dashboard.html"
            class="block px-4 py-2 rounded-lg hover:bg-white/70 transition"
          >
            Dashboard
          </a>

          <a href="#" class="block px-4 py-2 rounded-lg bg-white shadow">
            Kelola Data Siswa
          </a>

          <a
            href="./teachers.html"
            class="block px-4 py-2 rounded-lg hover:bg-white/70 transition"
          >
            Kelola Data Guru
          </a>

          <a
            href="./classes.html"
            class="block px-4 py-2 rounded-lg hover:bg-white/70 transition"
          >
            Kelola Kelas
          </a>

          <a
            href="./subject.html"
            class="block px-4 py-2 rounded-lg hover:bg-white/70 transition"
          >
            Kelola Mapel
          </a>

          <a
            href="./lessonTime.html"
            class="block px-4 py-2 rounded-lg hover:bg-white/70 transition"
          >
            Kelola Jam Mapel
          </a>

          <a
            href="./schedule.html"
            class="block px-4 py-2 rounded-lg hover:bg-white/70 transition"
          >
            Kelola Jadwal
          </a>

          <a
            href="./attendanceMonitoring.html"
            class="block px-4 py-2 rounded-lg hover:bg-white/70 transition"
          >
            Monitoring Absen
          </a>

          <a
            href="./adminAttendance.html"
            class="block px-4 py-2 rounded-lg hover:bg-white/70 transition"
          >
            Absen Siswa
          </a>

          <a
            href="./studentsPermissions.html"
            class="block px-4 py-2 rounded-lg hover:bg-white/70 transition"
          >
            Approve Izin Siswa
          </a>

          <a
            href="./teacherPermissions.html"
            class="block px-4 py-2 rounded-lg hover:bg-white/70 transition"
          >
            Approve Izin Guru
          </a>

          <div class="rounded-lg overflow-hidden">
            <button
              id="reportMenuBtn"
              type="button"
              class="w-full flex items-center justify-between px-4 py-2 rounded-lg hover:bg-white/70 transition"
            >
              <span>Cetak Laporan</span>

              <i
                id="reportChevron"
                data-lucide="chevron-right"
                class="w-4 h-4 transition-transform duration-300"
              ></i>
            </button>

            <div
              id="reportSubmenu"
              class="max-h-0 overflow-hidden transition-all duration-300 ml-4 space-y-2"
            >
              <a
                href="./teacherAttendanceReport.html"
                class="block px-4 py-2 rounded-lg hover:bg-white/70 transition"
              >
                Laporan Absensi Guru
              </a>

              <a
                href="./studentAttendanceReport.html"
                class="block px-4 py-2 rounded-lg hover:bg-white/70 transition"
              >
                Laporan Absensi Siswa
              </a>
            </div>
          </div>
        </nav>
      </aside>

      <!-- MAIN CONTENT -->
      <div class="flex-1 w-full overflow-y-auto">
        <!-- MOBILE TOP NAV -->
        <div
          class="md:hidden flex justify-between items-center bg-[#C3D9E6] p-4"
        >
          <h2 class="font-bold text-[#1E3A5F]">SUMPAY.Edu</h2>
          <button onclick="toggleSidebar()" class="text-2xl text-[#1E3A5F]">
            ☰
          </button>
        </div>
        <div class="p-6 md:p-8">
          <!-- HEADER -->

          <div>
            <h2 class="text-3xl font-bold text-[#1E3A5F]">Kelola Data Siswa</h2>
            <!-- <p class="text-gray-500 text-sm">Manajemen data kelas sekolah</p> -->
          </div>

          <div
            class="flex flex-col md:flex-row md:justify-between md:items-center gap-4 mb-8 mt-6"
          >
            <!-- Filter Kelas -->
            <div class="w-full md:w-auto">
              <!-- <label class="block font-medium text-gray-600">
                Filter Kelas
              </label> -->

              <select
                id="filterKelas"
                class="w-full md:w-54 p-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
              >
                <option value="">Semua Kelas</option>
                <!-- <option value="1A">Kelas 1A</option>
                <option value="1B">Kelas 1B</option>
                <option value="2A">Kelas 2A</option> -->
              </select>
            </div>

            <button
              id="btnAddStudents"
              class="w-full md:w-auto bg-[#1E3A5F] text-white px-5 py-2.5 rounded-xl shadow hover:opacity-90 transition flex items-center justify-center gap-2"
            >
              <span class="text-lg">＋</span>
              Tambah Siswa
            </button>
          </div>

          <!-- CARD TABLE -->
          <div
            class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden"
          >
            <!-- TABLE WRAPPER -->
            <div class="overflow-x-auto">
              <table class="min-w-full text-sm text-left">
                <thead class="bg-[#C3D9E6]/40 text-[#1E3A5F]">
                  <tr>
                    <th class="px-3 md:px-6 py-3 md:py-4">No</th>
                    <th class="px-3 md:px-6 py-3 md:py-4">Nama</th>
                    <th class="px-3 md:px-6 py-3 md:py-4">NISN</th>
                    <th class="px-3 md:px-6 py-3 md:py-4">Jenis Kelamin</th>
                    <th
                      class="px-3 md:px-6 py-3 md:py-4 text-center whitespace-nowrap"
                    >
                      Action
                    </th>
                  </tr>
                </thead>

                <tbody id="tableSiswaBody" class="divide-y divide-gray-100">
                  <!-- DATA DINAMIS DARI JS -->
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- SIDEBAR SCRIPT -->
    <script>
      function toggleSidebar() {
        const sidebar = document.getElementById("sidebar");
        const overlay = document.getElementById("overlay");

        sidebar.classList.toggle("-translate-x-full");
        overlay.classList.toggle("hidden");
      }

      const reportBtn = document.getElementById("reportMenuBtn");
      const reportSubmenu = document.getElementById("reportSubmenu");
      const reportChevron = document.getElementById("reportChevron");

      reportBtn.addEventListener("click", function () {
        if (reportSubmenu.classList.contains("max-h-0")) {
          reportSubmenu.classList.remove("max-h-0");
          reportSubmenu.classList.add("max-h-40");

          reportChevron.classList.add("rotate-90");
        } else {
          reportSubmenu.classList.add("max-h-0");
          reportSubmenu.classList.remove("max-h-40");

          reportChevron.classList.remove("rotate-90");
        }
      });
    </script>

    <!-- SWEETALERT -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <!-- icon -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- modal dialog -->

    <!-- MODAL SISWA -->
    <div
      id="studentModal"
      class="fixed inset-0 bg-black/40 hidden items-center justify-center z-50"
    >
      <div class="bg-white w-full max-w-lg rounded-2xl shadow-xl p-6 relative">
        <h3 id="modalTitle" class="text-xl font-bold text-[#1E3A5F] mb-6">
          Tambah Siswa
        </h3>

        <form id="studentForm" class="space-y-4">
          <input type="hidden" id="studentId" />

          <div>
            <label class="block text-sm font-medium mb-1">Nama Siswa</label>
            <input
              type="text"
              id="nama"
              class="w-full p-2 border rounded-lg focus:ring-2 focus:ring-blue-500"
              required
            />
          </div>

          <div>
            <label class="block text-sm font-medium mb-1">NISN</label>
            <input
              type="text"
              id="nisn"
              class="w-full p-2 border rounded-lg focus:ring-2 focus:ring-blue-500"
              required
            />
          </div>

          <div>
            <label class="block text-sm font-medium mb-1">PASSWORD</label>
            <input
              type="password"
              id="password"
              class="w-full p-2 border rounded-lg focus:ring-2 focus:ring-blue-500"
              required
            />
          </div>

          <div>
            <label class="block text-sm font-medium mb-1">Jenis Kelamin</label>
            <select
              id="jenisKelamin"
              class="w-full p-2 border rounded-lg focus:ring-2 focus:ring-blue-500"
              required
            >
              <option value="">Pilih Jenis Kelamin</option>
              <option value="L">Laki-laki</option>
              <option value="P">Perempuan</option>
            </select>
          </div>

          <div>
            <label class="block text-sm font-medium mb-1">Kelas</label>
            <select
              id="kelas"
              class="w-full p-2 border rounded-lg focus:ring-2 focus:ring-blue-500"
              required
            >
              <option value="">Pilih Kelas</option>
              <option value="1A">1A</option>
              <option value="1B">1B</option>
              <option value="2A">2A</option>
            </select>
          </div>

          <div class="flex justify-end gap-3 pt-4">
            <button
              type="button"
              id="btnCloseModal"
              class="px-4 py-2 rounded-lg border hover:bg-gray-100"
            >
              Batal
            </button>

            <button
              type="submit"
              class="px-5 py-2 bg-[#1E3A5F] text-white rounded-lg hover:opacity-90"
            >
              Simpan
            </button>
          </div>
        </form>
      </div>
    </div>

    <!-- JS MODULE -->
    <script type="module" src="../../js/students.js"></script>
  </body>
</html>
