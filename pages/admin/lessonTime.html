<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kelola Jam Pelajaran</title>
    <link href="../../assets/css/output.css" rel="stylesheet" />
  </head>

  <body class="bg-slate-50 overflow-hidden">
    <div class="flex h-screen">
      <!-- OVERLAY (mobile) -->
      <div
        id="overlay"
        class="fixed inset-0 bg-black/40 hidden z-40 md:hidden"
        onclick="toggleSidebar()"
      ></div>

      <aside
        id="sidebar"
        class="fixed md:static top-0 left-0 h-screen md:h-auto md:min-h-full overflow-y-auto z-50 w-64 bg-[#C3D9E6] text-[#1E3A5F] p-6 flex flex-col transform -translate-x-full md:translate-x-0 transition-transform duration-300 ease-in-out"
      >
        <div class="mb-10 text-center">
          <img
            src="../../assets/images/logo sumpay.edu.png"
            class="w-27 mx-auto mt-4"
          />
          <!-- <h1 class="text-xl font-bold text-slate-800 mt-3">SUMPAY.Edu</h1> -->
        </div>

        <nav class="space-y-2 text-sm font-medium">
          <a
            href="./dashboard.html"
            class="block px-4 py-2 rounded-lg hover:bg-white/70 transition"
          >
            Dashboard
          </a>

          <a
            href="./students.html"
            class="block px-4 py-2 rounded-lg hover:bg-white/70 transition"
          >
            Kelola Data Siswa
          </a>

          <a
            href="#"
            class="block px-4 py-2 rounded-lg hover:bg-white/70 transition"
          >
            Kelola Data Guru
          </a>

          <a
            href="./classes.html"
            class="block px-4 py-2 rounded-lg hover:bg-white/70 transition"
          >
            Kelola Kelas
          </a>

          <a
            href="./subject.html"
            class="block px-4 py-2 rounded-lg hover:bg-white/70 transition"
          >
            Kelola Mapel
          </a>

          <a
            href="./lessonTime.html"
            class="block px-4 py-2 rounded-lg bg-white shadow"
          >
            Kelola Jam Mapel
          </a>

          <a
            href="./schedule.html"
            class="block px-4 py-2 rounded-lg hover:bg-white/70 transition"
          >
            Kelola Jadwal
          </a>

          <a
            href="./studentsPermissions.html"
            class="block px-4 py-2 rounded-lg hover:bg-white/70 transition"
          >
            Approve Izin Siswa
          </a>

          <a
            href="./teacherPermissions.html"
            class="block px-4 py-2 rounded-lg hover:bg-white/70 transition"
          >
            Approve Izin Guru
          </a>

          <a
            href="#"
            class="block px-4 py-2 rounded-lg hover:bg-white/70 transition"
          >
            Cetak Laporan
          </a>
        </nav>
      </aside>

      <!-- MAIN CONTENT -->
      <div class="flex-1 w-full overflow-y-auto">
        <!-- MOBILE TOP NAV -->
        <div
          class="md:hidden flex justify-between items-center bg-[#C3D9E6] p-4"
        >
          <h2 class="font-bold text-[#1E3A5F]">SUMPAY.Edu</h2>
          <button onclick="toggleSidebar()" class="text-2xl text-[#1E3A5F]">
            ☰
          </button>
        </div>
        <div class="p-6 md:p-8">
          <!-- HEADER -->
          <div
            class="flex flex-col md:flex-row md:justify-between md:items-center gap-4 mb-8"
          >
            <div>
              <h2 class="text-3xl font-bold text-[#1E3A5F]">
                Kelola Jam Mapel
              </h2>
              <!-- <p class="text-gray-500 text-sm">Manajemen data kelas sekolah</p> -->
            </div>

            <button
              id="btnAddLessonTime"
              class="self-end md:self-auto bg-[#1E3A5F] text-white px-5 py-2.5 rounded-xl shadow hover:opacity-90 transition flex items-center gap-2"
            >
              <span class="text-lg">＋</span>
              Tambah Jam Mapel
            </button>
          </div>

          <!-- CARD TABLE -->
          <div
            class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden"
          >
            <!-- TABLE WRAPPER -->
            <div class="overflow-x-auto">
              <table class="min-w-full text-sm text-left">
                <thead class="bg-[#C3D9E6]/40 text-[#1E3A5F]">
                  <tr>
                    <th class="px-6 py-4">No</th>
                    <th class="px-6 py-4">Jam</th>
                    <th class="px-6 py-4">Waktu</th>
                    <th class="px-6 py-4 text-center">Action</th>
                  </tr>
                </thead>

                <tbody
                  id="lessonTimeTableBody"
                  class="divide-y divide-gray-100"
                >
                  <!-- DATA DINAMIS DARI JS -->
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- SIDEBAR SCRIPT -->
    <script>
      function toggleSidebar() {
        const sidebar = document.getElementById("sidebar");
        const overlay = document.getElementById("overlay");
        sidebar.classList.toggle("-translate-x-full");
        overlay.classList.toggle("hidden");
      }
    </script>

    <!-- SWEETALERT -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <!-- icon -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
      lucide.createIcons();
    </script>

    <!-- JS MODULE -->
    <script type="module" src="../../js/lessonTime.js"></script>
  </body>
</html>
